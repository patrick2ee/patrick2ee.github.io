<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Unlock — Patrick Toohey</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Source+Serif+4:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <main class="unlock">
    <div class="unlock__inner">
      <p class="eyebrow">Patrick Toohey</p>
      <h1>This portfolio is by invitation only.</h1>
      <p>Enter the password shared with you to view Patrick's portfolio.</p>

      <form id="unlock-form" class="form" autocomplete="off">
        <label for="unlock-input" class="visually-hidden">Password</label>
        <input
          id="unlock-input"
          type="password"
          placeholder="Password"
          autofocus
          required
        />
        <button type="submit" class="btn">Unlock</button>
        <p id="unlock-error" class="unlock__error" role="alert" aria-live="polite"></p>
      </form>
    </div>
  </main>

  <script src="assets/js/main.js"></script>
</body>
</html>
